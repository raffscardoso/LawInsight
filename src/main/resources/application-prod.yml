spring:
  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: true
    out-of-order: false

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/lawinsight}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:lawinsight}
    password: ${DB_PASSWORD:lawinsight}

    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 25
          batch_versioned_data: true
        order_inserts: true
        order_updates: true
        default_batch_fetch_size: 20
